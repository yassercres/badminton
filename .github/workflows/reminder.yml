name: Match reminder

# Runs on GitHub's servers on a schedule — no app needs to be open.
on:
  schedule:
    - cron: "0 * * * *"      # every hour, on the hour (UTC). Best-effort timing.
  workflow_dispatch: {}       # lets you run it manually from the Actions tab to test

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install "supabase>=2.6"

      - name: Send reminder if a match is ~12h away
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python reminder/reminder.py
